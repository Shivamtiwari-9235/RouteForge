services:
  - type: web
    name: routeforge-backend
    runtime: node
    buildCommand: npm install
    startCommand: npm run dev
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: FRONTEND_URL
        value: https://silly-genie-ba3255.netlify.app
      - key: CONFIG_SOURCE
        value: local
      - key: CONFIG_PATH
        value: ./src/config/appConfig.json